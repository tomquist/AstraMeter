[package]
name = "astrameter-platform-espidf"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
description = "ESP32 (esp-idf-svc / esp-idf-hal) implementations of astrameter-platform traits."

[dependencies]
astrameter-core = { workspace = true }
astrameter-platform = { workspace = true }
async-trait = { workspace = true }

# The esp-idf-svc / esp-idf-hal crates require the Xtensa toolchain. Gating
# them behind cfg(target_os = "espidf") keeps host `cargo check` working
# without espup installed.
[target.'cfg(target_os = "espidf")'.dependencies]
esp-idf-svc = { version = "0.49", default-features = false, features = ["std", "binstart"] }
esp-idf-hal = { version = "0.44", default-features = false }
embedded-svc = "0.28"
log = "0.4"
