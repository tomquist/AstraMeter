esphome:
  name: ct002-cloud-reporting-esp32-ard

esp32:
  board: esp32dev
  framework:
    type: arduino

logger:
  level: DEBUG

wifi:
  ssid: "test-ssid"
  password: "test-password"

external_components:
  - source:
      type: local
      path: ../../../esphome/components
    components: [ct002]

http_request:
  timeout: 20s
  verify_ssl: false

sensor:
  - platform: template
    id: grid_l1
    lambda: 'return 0.0f;'
    update_interval: 1s

ct002:
  id: ct002_main
  power_sensor_l1: grid_l1
  ct_type: HME-4
  ct_mac: "02b25012abcd"
  udp_port: 12345
  cloud_reporting:
    host: eu.hamedata.com
    interval: 60s
