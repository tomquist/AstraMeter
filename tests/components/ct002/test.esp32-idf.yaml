esphome:
  name: ct002-esp32-idf-test
  friendly_name: CT002 ESP32 IDF Test

esp32:
  board: esp32dev
  framework:
    type: esp-idf

api:
logger:
wifi:
  ssid: "test"
  password: "testpassword"

external_components:
  - source:
      type: local
      path: ../../../esphome/components
    components: [ct002]

sensor:
  - platform: template
    id: grid_l1
    name: Grid L1
    lambda: |-
      return 0.0f;
    update_interval: 1s
  - platform: template
    id: grid_l2
    name: Grid L2
    lambda: |-
      return 0.0f;
    update_interval: 1s
  - platform: template
    id: grid_l3
    name: Grid L3
    lambda: |-
      return 0.0f;
    update_interval: 1s

ct002:
  id: ct002_main
  power_sensor_l1: grid_l1
  power_sensor_l2: grid_l2
  power_sensor_l3: grid_l3
  ct_type: HME-4
  ct_mac: "02b25012abcd"
  udp_port: 12345
  active_control: true
  max_sensor_age: 30s
  filters:
    hampel:
      window: 7
      n_sigma: 3.0
      min_threshold: 50
    smoothing:
      alpha: 0.3
      max_step: 200
    deadband:
      deadband: 10
    pid:
      kp: 0.5
      ki: 0.1
      kd: 0.0
      output_max: 800
      mode: bias
  balancer:
    fair_distribution: true
    balance_gain: 0.2
    balance_deadband: 25
    min_efficient_power: 0
  saturation:
    enabled: true
    alpha: 0.15
    min_target: 20
