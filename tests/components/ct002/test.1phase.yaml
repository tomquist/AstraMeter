esphome:
  name: ct002-1phase-test
  friendly_name: CT002 1-Phase Test

esp32:
  board: esp32dev
  framework:
    type: esp-idf

api:
logger:
wifi:
  ssid: "test"
  password: "testpassword"

external_components:
  - source:
      type: local
      path: ../../../esphome/components
    components: [ct002]

sensor:
  - platform: template
    id: grid_l1
    name: Grid L1
    lambda: |-
      return 0.0f;
    update_interval: 1s

ct002:
  id: ct002_main
  power_sensor_l1: grid_l1
  ct_type: HME-4
  active_control: true
