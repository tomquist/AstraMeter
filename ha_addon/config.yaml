name: "AstraMeter"
version: "next"
slug: b2500_meter
description: >-
  "Replicates a Smart Meter device for Marstek energy storage systems (formerly B2500 Meter) while allowing integration with various smart meters."
arch:
  - amd64
  - aarch64
url: "https://github.com/tomquist/astrameter"
image: "ghcr.io/tomquist/astrameter-addon"
panel_icon: "mdi:meter-electric"
init: false
startup: application
boot: auto
auto_restart: true
watchdog: "http://[HOST]:[PORT:52500]/health"
services:
  - "mqtt:want"
homeassistant_api: true
hassio_api: true
hassio_role: homeassistant
host_network: true
ports:
  12345/udp: 12345
  1010/udp: 1010
  2220/udp: 2220
  2222/udp: 2222
  2223/udp: 2223
map:
  - type: addon_config
    read_only: false
options:
  power_input_alias: "sensor.current_power_in"
  power_output_alias: ""
  device_types: "shellypro3em"
  throttle_interval: 0
  marstek_auto_register_ct_device: false
  marstek_mailbox: ""
  marstek_password: ""
  min_efficient_power: 0
  efficiency_rotation_interval: 900
  log_level: "info"
schema:
  power_input_alias: str
  power_output_alias: str?
  device_types: str
  throttle_interval: float(0,)
  ct_mac: str?
  marstek_auto_register_ct_device: bool?
  marstek_mailbox: str?
  marstek_password: password?
  min_efficient_power: int(0,)?
  efficiency_rotation_interval: int(1,)?
  log_level: list(critical|error|warning|info|debug)
  power_offset: str?
  power_multiplier: str?
  custom_config: str?
  mqtt_uri: str?
