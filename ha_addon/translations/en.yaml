configuration:
  power_input_alias:
    name: Power Input Entity ID
    description: "The entity ID of the sensor(s) that provide the current power input. For multi-phase setups, enter multiple entity IDs separated by commas (e.g., 'sensor.phase1_in,sensor.phase2_in,sensor.phase3_in')."
  power_output_alias:
    name: Power Output Entity ID
    description: "The entity ID of the sensor(s) that provide the current power output. For multi-phase setups, enter multiple entity IDs separated by commas (e.g., 'sensor.phase1_out,sensor.phase2_out,sensor.phase3_out'). If you only have one sensor for both input and output, leave this empty."
  device_types:
    name: Emulated Devices
    description: "Comma-separated list of devices to emulate (ct002, ct003, shellypro3em, shellyemg3, shellyproem50, shellypro3em_old, shellypro3em_new). Use ct002 or ct003 for multiple storage devices; use a Shelly type otherwise. The device type shellypro3em_old uses port 1010 (used up until B2500 firmware version 224). The device type shellypro3em_new uses the new port 2220 (used for B2500 firmware >=226). If you use shellypro3em, it will use shellypro3em_old and shellypro3em_new simultaneously for backwards compatibility."
  ct_mac:
    name: CT MAC Override
    description: "Optional MAC address of the emulated CT device (the CT MAC addressed in incoming requests). Leave empty to respond regardless of addressed CT MAC and mirror that addressed CT MAC in the response. If set, only requests addressed to this CT MAC are answered."
  throttle_interval:
    name: Throttling Interval
    description: "Minimum time interval (in seconds) between power meter readings. When set to 0, throttling is disabled for maximum performance. For slower data sources or to prevent control instability, set to 1-3 seconds. Supports decimal values (e.g., 1.5 for 1.5 seconds). Increase this value if you're seeing oscillations or instability with slow data sources."
  wait_for_next_message:
    name: Wait For Fresh Home Assistant Reading
    description: "When enabled (default), the app waits briefly (up to 2 seconds) for Home Assistant to push a fresh value before responding to the battery, keeping control loops on the freshest data. Disable this if your source sensor (e.g. a P1 smart meter) updates slower than 2 seconds — turning it off avoids the needless wait and always serves the last-known value immediately."
  log_level:
    name: Log Level
    description: "Controls the verbosity of log messages. Select 'critical' for only critical errors, 'error' for error messages and above, 'warning' for warnings and above, 'info' for informational messages and above (recommended), or 'debug' for detailed debugging information. Use 'debug' for troubleshooting connection or configuration issues."
  custom_config:
    name: Custom Config
    description: "Optional. Name of a custom config.ini file to use instead of the UI configuration. The file must be placed in the app's configuration directory."
  mqtt_uri:
    name: Custom MQTT URI
    description: "Optional. MQTT broker URI for MQTT Insights, e.g. mqtt://user:pass@broker.example.com:1883 (or mqtts:// for TLS). When set, this overrides Home Assistant's internal MQTT broker. Leave empty to use the Mosquitto add-on automatically."
  active_control:
    name: Active Control
    description: "When enabled (default), the emulator smooths the grid reading, splits the target across batteries and balances them. Disable for relay mode: the raw per-phase readings are forwarded and each battery decides on its own. Only applies to CT002/CT003 device types."
  min_efficient_power:
    name: Min Efficient Power
    description: "Minimum watts each active battery should handle. At low demand, excess batteries are idled so the remaining ones stay above this threshold and operate more efficiently. Set to 0 to disable (default). Example: 2 batteries, 200 W demand, threshold 150 — one battery gets 200 W, the other idles. Only applies to CT002/CT003 device types."
  efficiency_rotation_interval:
    name: Efficiency Rotation Interval
    description: "Seconds between rotating which battery has priority when Min Efficient Power is active (default 900). Ensures fair wear across batteries by periodically swapping which batteries are active and which are idled. Minimum value is 1. Only applies to CT002/CT003 device types."
  min_dc_output:
    name: Min DC Output
    description: "Minimum discharge (in watts) to keep a DC battery's inverter (e.g. Marstek B2500) from switching off at 0 W and falling asleep under high PV surplus. Applies per battery and only affects DC-only batteries without their own inverter (Venus and Jupiter are unaffected). Set to 0 to disable (default); recommended >= 20. Only applies to CT002/CT003 device types."
  grid_predict_trust:
    name: Grid Prediction
    description: "Keeps the grid closer to zero — less import, less export, less overshoot and hunting — by adapting automatically to your power meter, including meters that report with a delay (e.g. a Home Assistant push sensor). 0.5 (default) is recommended and needs no tuning; lower values react more cautiously and 0 turns the feature off (steer directly on the raw meter reading). Only applies to CT002/CT003 device types."
  marstek_auto_register_ct_device:
    name: Auto-register Managed CT Device (Marstek)
    description: "If enabled, the app signs in to your Marstek account at startup and ensures one managed fake CT device exists for each emulated CT type (ct002 -> HME-4, ct003 -> HME-3). Existing matching devices are reused to avoid duplicates."
  marstek_mailbox:
    name: Marstek Account Email
    description: "Email address used to sign in to your Marstek account for managed CT device registration."
  marstek_password:
    name: Marstek Account Password
    description: "Password used to sign in to your Marstek account for managed CT device registration."
  power_offset:
    name: Power Offset
    description: "Optional. Added to each power value after the multiplier is applied. Single value (e.g. -50) or a comma-separated list (one per phase, e.g. -50,-30,-40). Leave empty to disable."
  power_multiplier:
    name: Power Multiplier
    description: "Optional. Scales each power value (formula: value * POWER_MULTIPLIER + POWER_OFFSET). Single value (e.g. 1.05) or a comma-separated list (one per phase, e.g. 1.05,1.02,1.03). Use -1 to flip polarity. Leave empty to disable."
  dedupe_time_window:
    name: Deduplication Time Window
    description: "Optional. Seconds during which repeat requests from the same battery are ignored. Applies to both CT002/CT003 (keyed by consumer id) and Shelly (keyed by battery IP) emulators. Set to 0 or leave empty to disable."
  smooth_target_alpha:
    name: Smoothing Alpha (EMA)
    description: "Optional. Exponential moving-average factor in (0, 1] applied to power readings from Home Assistant. Smaller values smooth more heavily (e.g. 0.1 = heavy smoothing, 0.5 = light). Leave empty to disable."
  max_smooth_step:
    name: Max Smoothing Step
    description: "Optional. Caps the maximum watt change per cycle when smoothing is active. Use together with Smoothing Alpha to bound per-step jumps (e.g. 200). Leave empty or 0 for unlimited."
  deadband:
    name: Deadband (W)
    description: "Optional. Readings with absolute value below this threshold are reported as 0 W to stop battery micro-cycling near zero demand (e.g. 5). Leave empty or 0 to disable."
  hampel_window:
    name: Hampel Window
    description: "Optional. Rejects sudden outlier spikes (e.g. WiFi/MQTT glitches) by comparing each reading to a rolling median. This sets the window size; try 5-7. Leave empty or 0 to disable."
  hampel_n_sigma:
    name: Hampel Sensitivity (sigma)
    description: "Optional. How far from the median a reading must be to count as an outlier. Lower = more aggressive filtering. Default 3.0. Only used when Hampel Window is set."
  hampel_min_threshold:
    name: Hampel Minimum Threshold (W)
    description: "Optional. Smallest spike (in watts) that may be rejected, so tiny fluctuations on a steady signal are never filtered. Try 50. Leave empty or 0 for no floor. Only used when Hampel Window is set."
  pid_kp:
    name: PID Proportional Gain (Kp)
    description: "Optional. Enables a PID controller that steers grid power toward zero. Start at 0.5 (stable between 0 and 1). Leave empty or 0 to disable PID."
  pid_ki:
    name: PID Integral Gain (Ki)
    description: "Optional. Integral gain for the PID controller. Usually leave empty (0) to avoid wind-up. Only used when PID Proportional Gain is set."
  pid_kd:
    name: PID Derivative Gain (Kd)
    description: "Optional. Derivative gain for the PID controller. Usually leave empty (0) - it tends to be noisy on real meters. Only used when PID Proportional Gain is set."
  pid_output_max:
    name: PID Output Limit (W)
    description: "Optional. Caps the PID adjustment to plus/minus this many watts. Default 800. Only used when PID Proportional Gain is set."
  pid_mode:
    name: PID Mode
    description: "Optional. 'bias' adds the PID adjustment to the meter reading (recommended); 'replace' uses the PID output instead of the reading. Default bias. Only used when PID Proportional Gain is set."