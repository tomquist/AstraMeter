name: Deploy config generator to GitHub Pages

# Publishes the static web/ site to the gh-pages branch, which GitHub Pages
# serves at the repository's Pages URL.
#
#   push to main    -> published to the site ROOT (production)
#                      https://<user>.github.io/<repo>/
#   push to develop -> published under /develop/ (staging)
#                      https://<user>.github.io/<repo>/develop/
#
# One-time setup: repository Settings → Pages → "Build and deployment" →
# Source → "Deploy from a branch" → branch "gh-pages" / "/ (root)".
#
# The gh-pages branch also holds per-PR previews (under pr-preview/, managed by
# .github/workflows/pr-preview.yml). keep_files: true ensures each push only
# overlays its own destination dir and never wipes the others (root / develop /
# pr-preview all coexist on the branch).

on:
  push:
    branches: [main, develop]
    paths:
      - "web/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  # Single group (no cancel) so main/develop pushes serialise instead of racing
  # each other's push to the gh-pages branch.
  group: gh-pages-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Validate schema and run generator tests
        run: |
          node web/js/schema.test.mjs
          node web/js/state.test.mjs
          node web/js/generate.test.mjs
      - name: Publish web/ to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./web
          publish_branch: gh-pages
          # main -> root, develop -> /develop/
          destination_dir: ${{ github.ref_name == 'develop' && 'develop' || '' }}
          # Preserve the other published dirs (root / develop / pr-preview).
          keep_files: true
