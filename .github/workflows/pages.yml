name: Deploy config generator to GitHub Pages

# Publishes the static web/ config generator to the gh-pages branch, which
# GitHub Pages serves at the repository's Pages URL.
#
# One-time setup: repository Settings → Pages → "Build and deployment" →
# Source → "Deploy from a branch" → branch "gh-pages" / "/ (root)".
#
# The gh-pages branch is also where per-PR previews live (under pr-preview/,
# managed by .github/workflows/pr-preview.yml), so this job keeps existing
# files instead of wiping the branch.

on:
  push:
    branches: [main, develop]
    paths:
      - "web/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Run config generator tests
        run: node web/js/generate.test.mjs
      - name: Publish web/ to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./web
          publish_branch: gh-pages
          # Preserve pr-preview/* directories created by the preview workflow.
          keep_files: true
