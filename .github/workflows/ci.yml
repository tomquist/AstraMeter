name: CI Pipeline

on:
  push:
    branches: [ "main", "develop" ]
    tags: [ "*.*.*" ]
  pull_request:
    branches: [ "main", "develop" ]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Rust lint + test runs as a parallel workflow (.github/workflows/rust-ci.yml).
  # This workflow only orchestrates the container images.

  build:
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        config:
          - platform: linux/amd64
            cache_scope: base-linux-amd64
          - platform: linux/arm64
            cache_scope: base-linux-arm64
    uses: ./.github/workflows/build-image.yml
    with:
      registry: ghcr.io
      platform: ${{ matrix.config.platform }}
      cache_scope: ${{ matrix.config.cache_scope }}
      context: .
      dockerfile: ./Dockerfile
      image-suffix: ""
      digest-prefix: "digests-base-"
      push: ${{ github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository }}

  merge:
    needs: [ build ]
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/merge-manifests.yml
    with:
      registry: ghcr.io
      image-suffix: ""
      digest-prefix: "digests-base-"
      legacy-image-name: tomquist/b2500-meter

  build-addon:
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            cache_scope: addon-linux-amd64
          - platform: linux/arm64
            cache_scope: addon-linux-arm64
    uses: ./.github/workflows/build-image.yml
    with:
      registry: ghcr.io
      platform: ${{ matrix.platform }}
      cache_scope: ${{ matrix.cache_scope }}
      context: .
      dockerfile: ./ha_addon/Dockerfile
      build-args: |
        BUILD_FROM=ghcr.io/hassio-addons/base:17.0.1
      image-suffix: "-addon"
      digest-prefix: "digests-addon-"
      push: ${{ github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository }}

  merge-addon:
    needs: [ build-addon ]
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/merge-manifests.yml
    with:
      registry: ghcr.io
      image-suffix: "-addon"
      digest-prefix: "digests-addon-"
      legacy-image-name: tomquist/b2500-meter
