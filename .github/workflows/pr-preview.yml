name: Deploy PR preview

# Deploys a live, per-PR preview of the web/ config generator so reviewers can
# test the actual site straight from the pull request. The preview is published
# to gh-pages under pr-preview/pr-<number>/ and a sticky comment with the URL is
# posted on the PR. The preview is torn down automatically when the PR closes.
#
# Requires the same one-time Pages setup as pages.yml (Source → gh-pages branch).
# Only runs for same-repo branches (forks can't write to gh-pages).

on:
  pull_request:
    types: [opened, reopened, synchronize, closed]
    branches: [main, develop]
    paths:
      - "web/**"
      - ".github/workflows/pr-preview.yml"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: pr-preview-${{ github.event.number }}
  cancel-in-progress: true

jobs:
  preview:
    # Skip PRs from forks: they lack write access to push the preview.
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Validate schema and run generator tests
        if: github.event.action != 'closed'
        run: |
          node web/js/schema.test.mjs
          node web/js/state.test.mjs
          node web/js/generate.test.mjs
      - name: Deploy preview
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: ./web
          preview-branch: gh-pages
          umbrella-dir: pr-preview
