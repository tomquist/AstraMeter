name: Merge Manifests

on:
  workflow_call:
    inputs:
      registry:
        required: true
        type: string
        description: "Container registry to use"
      image-suffix:
        required: true
        type: string
      digest-prefix:
        required: true
        type: string
      legacy-image-name:
        required: false
        type: string
        default: ""
        description: "Optional legacy image name (e.g. owner/repo) to publish the same manifest under for backward compatibility"

jobs:
  merge:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download digests
        uses: actions/download-artifact@v7
        with:
          pattern: ${{ inputs.digest-prefix }}*
          path: /tmp/digests
          merge-multiple: true
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - id: lower-repo
        # Pass inputs via env (not ${{ }} interpolation) to avoid template
        # injection, and reject control characters so a crafted suffix can't
        # inject extra $GITHUB_OUTPUT keys.
        env:
          IMAGE_SUFFIX: ${{ inputs.image-suffix }}
          LEGACY_IMAGE_NAME: ${{ inputs.legacy-image-name }}
        run: |
          if printf '%s' "$IMAGE_SUFFIX" | grep -q '[[:cntrl:]]'; then
            echo "Invalid image-suffix: control characters are not allowed" >&2
            exit 1
          fi
          printf 'IMAGE_NAME=%s%s\n' "${GITHUB_REPOSITORY@L}" "$IMAGE_SUFFIX" >> "$GITHUB_OUTPUT"
          if [ -n "$LEGACY_IMAGE_NAME" ]; then
            if printf '%s' "$LEGACY_IMAGE_NAME" | grep -q '[[:cntrl:]]'; then
              echo "Invalid legacy-image-name: control characters are not allowed" >&2
              exit 1
            fi
            LEGACY_LOWER=$(printf '%s' "$LEGACY_IMAGE_NAME" | tr '[:upper:]' '[:lower:]')
            printf 'LEGACY_IMAGE_NAME=%s%s\n' "$LEGACY_LOWER" "$IMAGE_SUFFIX" >> "$GITHUB_OUTPUT"
          fi
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ inputs.registry }}/${{ steps.lower-repo.outputs.IMAGE_NAME }}
            ${{ inputs.legacy-image-name != '' && format('{0}/{1}', inputs.registry, steps.lower-repo.outputs.LEGACY_IMAGE_NAME) || '' }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=ref,event=pr
            type=sha
            type=raw,value=next,enable=${{ github.ref == 'refs/heads/develop' }}
            type=semver,pattern={{version}},enable=${{ github.ref_type == 'tag' }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ github.ref_type == 'tag' }}
            type=semver,pattern={{major}},enable=${{ github.ref_type == 'tag' }}
          flavor: |
            latest=${{ github.ref == 'refs/heads/main' }}
      - name: Log in to Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ inputs.registry }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ inputs.registry }}/${{ steps.lower-repo.outputs.IMAGE_NAME }}@sha256:%s ' *)
      - name: Inspect image
        run: |
          docker buildx imagetools inspect ${{ inputs.registry }}/${{ steps.lower-repo.outputs.IMAGE_NAME }}:${{ steps.meta.outputs.version }}